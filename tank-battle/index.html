<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>坦克大战（单人 vs AI）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">坦克大战</div>
        <div class="help">
          <span>方向键移动</span>
          <span>空格射击</span>
          <span>R 重开</span>
          <span>P 暂停</span>
        </div>
      </header>

      <main class="main">
        <canvas id="game" width="960" height="640"></canvas>
        <aside class="panel">
          <div class="panel-section">
            <div class="panel-title">状态</div>
            <div class="kv"><span>关卡</span><span id="ui-level">1</span></div>
            <div class="kv"><span>生命</span><span id="ui-lives">3</span></div>
            <div class="kv"><span>敌人</span><span id="ui-enemies">0</span></div>
            <div class="kv"><span>得分</span><span id="ui-score">0</span></div>
          </div>

          <div class="panel-section">
            <div class="panel-title">提示</div>
            <div class="tips" id="ui-tip">
              清空所有敌方坦克即可进入下一关。
            </div>
          </div>
        </aside>
      </main>

      <footer class="footer">
        <small>纯前端实现：Canvas + JavaScript</small>
      </footer>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
